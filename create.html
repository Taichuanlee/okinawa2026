<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅遊手冊產生器 V2.1</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* 基礎樣式保持不變，新增備註樣式 */
        body { margin: 0; display: flex; height: 100vh; font-family: sans-serif; background: #f0f2f5; }
        #admin-panel { width: 420px; background: #fff; padding: 20px; box-shadow: 2px 0 10px rgba(0,0,0,0.1); overflow-y: auto; z-index: 100; }
        .input-group { margin-bottom: 20px; border-bottom: 2px solid #f0f2f5; padding: 15px; border-radius: 8px; position: relative; background: #fafafa; }
        .day-group { border-left: 5px solid #2c3e50; background: #f1f3f5; }
        .delete-btn { position: absolute; right: 10px; top: 10px; color: #e74c3c; cursor: pointer; font-size: 12px; font-weight: bold; }
        label { display: block; font-size: 12px; color: #666; margin-bottom: 3px; font-weight: bold; }
        input, textarea { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; margin-bottom: 8px; }
        
        /* 右側預覽 */
        #preview-area { flex-grow: 1; display: flex; height: 100vh; overflow: hidden; }
        #itinerary-view { width: 45%; height: 100vh; overflow-y: auto; padding: 40px 20px; background: #f4f7f9; }
        #map-view { width: 55%; height: 100vh; }
        
        .preview-card { 
            background: #fff; border-radius: 12px; padding: 15px; margin-bottom: 15px; 
            display: flex; gap: 15px; align-items: center; transition: 0.3s; border-left: 5px solid #3498db;
        }
        .preview-card:hover { transform: translateX(5px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-left-color: #e74c3c; cursor: pointer; }
        .preview-card img { width: 70px; height: 70px; object-fit: cover; border-radius: 8px; background: #eee; }
        .preview-desc { font-size: 13px; color: #666; margin-top: 4px; line-height: 1.4; }
        .preview-day { background: #2c3e50; color: #fff; padding: 6px 15px; border-radius: 20px; margin: 25px 0 15px 0; width: fit-content; }
        button { width: 100%; padding: 10px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>

<div id="admin-panel">
    <h2>🛠️ 行程產生器 V2.1</h2>
    <input type="text" id="in-title" value="我的新旅程" oninput="updatePreview()" placeholder="行程標題">
    <textarea id="in-notes" placeholder="重要資訊 (航班、天氣...)" oninput="updatePreview()"></textarea>
    
    <div id="item-inputs"></div>
    <button style="background:#3498db; color:#fff;" onclick="addNewItem()">➕ 新增景點</button>
    <button style="background:#2c3e50; color:#fff;" onclick="addDayHeader()">📅 插入日期標題</button>
    <button style="background:#27ae60; color:#fff; margin-top:20px;" onclick="exportFinalHTML()">💾 生成並下載網頁</button>
</div>

<div id="preview-area">
    <div id="itinerary-view">
        <h1 id="view-title" style="text-align:center;">我的新旅程</h1>
        <div id="view-notes" style="background:#fff; padding:15px; border-radius:10px; border-top:5px solid #f1c40f; display:none; margin-bottom:20px; font-size:14px;"></div>
        <div id="view-list"></div>
    </div>
    <div id="map-view"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let tripData = [{ isDay: true, text: "Day 1" }, { time: "12:00", name: "範例景點", lat: 26.212, lng: 127.68, img: "", desc: "這裡可以寫備註喔！" }];

    // 更換穩定的圖層 (CartoDB Positron)
    const map = L.map('map-view').setView([26.212, 127.68], 11);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
    let markerLayer = L.layerGroup().addTo(map);

    function updatePreview() {
        document.getElementById('view-title').innerText = document.getElementById('in-title').value;
        const notes = document.getElementById('in-notes').value;
        const nv = document.getElementById('view-notes');
        nv.style.display = notes.trim() ? "block" : "none";
        nv.innerHTML = "<strong>📌 備註：</strong><br>" + notes.replace(/\n/g, '<br>');

        const list = document.getElementById('view-list');
        list.innerHTML = "";
        markerLayer.clearLayers();

        tripData.forEach((item, index) => {
            if (item.isDay) {
                const d = document.createElement('div'); d.className = 'preview-day'; d.innerText = item.text;
                list.appendChild(d);
            } else {
                const card = document.createElement('div');
                card.className = 'preview-card';
                // 互動功能：滑鼠經過時地圖跳轉
                card.onmouseenter = () => { if(item.lat && item.lng) map.flyTo([item.lat, item.lng], 15); };
                
                card.innerHTML = `
                    <img src="${item.img || 'https://via.placeholder.com/100?text=No+Img'}">
                    <div style="flex:1">
                        <div style="color:#d9534f; font-weight:bold; font-size:12px;">${item.time}</div>
                        <div style="font-weight:bold; font-size:16px;">${item.name}</div>
                        ${item.desc ? `<div class="preview-desc">${item.desc}</div>` : ''}
                    </div>
                `;
                list.appendChild(card);
                if (item.lat && item.lng) L.marker([item.lat, item.lng]).addTo(markerLayer).bindPopup(item.name);
            }
        });
    }

    function renderInputs() {
        const container = document.getElementById('item-inputs');
        container.innerHTML = "";
        tripData.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = "input-group" + (item.isDay ? " day-group" : "");
            if (item.isDay) {
                div.innerHTML = `<span class="delete-btn" onclick="removeItem(${index})">✕</span><label>日期標題</label><input type="text" value="${item.text}" oninput="tripData[${index}].text=this.value; updatePreview()">`;
            } else {
                div.innerHTML = `
                    <span class="delete-btn" onclick="removeItem(${index})">✕</span>
                    <label>景點名稱</label><input type="text" value="${item.name}" oninput="tripData[${index}].name=this.value; updatePreview()">
                    <label>說明/備註</label><textarea placeholder="例如：必吃美食、門票資訊..." oninput="tripData[${index}].desc=this.value; updatePreview()">${item.desc || ''}</textarea>
                    <div style="display:flex; gap:5px;">
                        <input type="text" placeholder="時間" value="${item.time}" oninput="tripData[${index}].time=this.value; updatePreview()">
                        <input type="text" placeholder="圖片網址" value="${item.img}" oninput="tripData[${index}].img=this.value; updatePreview()">
                    </div>
                    <input type="text" placeholder="貼上 Google Maps 網址解析" onpaste="handleUrlPaste(event, ${index})">
                    <div style="display:flex; gap:5px;">
                        <input type="number" step="any" id="lat-${index}" placeholder="緯度" value="${item.lat}" oninput="tripData[${index}].lat=parseFloat(this.value); updatePreview()">
                        <input type="number" step="any" id="lng-${index}" placeholder="經度" value="${item.lng}" oninput="tripData[${index}].lng=parseFloat(this.value); updatePreview()">
                    </div>
                `;
            }
            container.appendChild(div);
        });
    }

    function handleUrlPaste(e, i) {
        setTimeout(() => {
            const m = e.target.value.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);
            if (m) { tripData[i].lat = parseFloat(m[1]); tripData[i].lng = parseFloat(m[2]); renderInputs(); updatePreview(); }
        }, 100);
    }

    function addNewItem() { tripData.push({ time: "", name: "新景點", lat: "", lng: "", img: "", desc: "" }); renderInputs(); updatePreview(); }
    function addDayHeader() { tripData.push({ isDay: true, text: "新的一天" }); renderInputs(); updatePreview(); }
    function removeItem(index) { tripData.splice(index, 1); renderInputs(); updatePreview(); }

    function exportFinalHTML() {
        // 匯出邏輯包含 V2.1 的地圖穩定版與備註顯示
        const title = document.getElementById('in-title').value;
        const notes = document.getElementById('in-notes').value;
        const dataString = JSON.stringify(tripData);
        const html = `
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><title>${title}</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; display: flex; height: 100vh; font-family: sans-serif; }
        #itinerary { width: 50%; height: 100vh; overflow-y: auto; padding: 30px; box-sizing: border-box; background: #f8f9fa; }
        #map { width: 50%; height: 100vh; position: sticky; top: 0; }
        .day-h { background: #2c3e50; color: #fff; padding: 10px 20px; border-radius: 50px; margin: 40px 0 20px 0; width: fit-content; }
        .card { background: #fff; padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); display: flex; gap: 20px; align-items: center; transition: 0.3s; }
        .card:hover { transform: scale(1.02); border-left: 8px solid #e74c3c; cursor: pointer; }
        .card img { width: 100px; height: 100px; object-fit: cover; border-radius: 10px; background:#eee; }
        .desc { font-size: 14px; color: #666; margin-top: 5px; }
        @media (max-width: 768px) { body { flex-direction: column; } #itinerary, #map { width: 100%; height: 50vh; } }
    </style>
</head>
<body>
    <div id="itinerary">
        <h1 style="text-align:center">🌊 ${title}</h1>
        ${notes ? `<div style="background:#fff; padding:20px; border-radius:10px; border-top:6px solid #f1c40f; margin-bottom:30px;">${notes.replace(/\n/g, '<br>')}</div>` : ''}
        <div id="list"></div>
    </div><div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"><\/script>
    <script>
        const data = ${dataString};
        const map = L.map('map').setView([data.find(d=>d.lat).lat, data.find(d=>d.lat).lng], 12);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
        data.forEach(item => {
            if(item.isDay) {
                const h = document.createElement('div'); h.className='day-h'; h.innerText=item.text;
                document.getElementById('list').appendChild(h);
            } else {
                const div = document.createElement('div'); div.className='card';
                div.onclick = () => { if(item.lat) map.flyTo([item.lat, item.lng], 15); };
                div.innerHTML = \`<img src="\${item.img || ''}"><div><div style="color:#d9534f;font-weight:bold;">\${item.time}</div><h3 style="margin:5px 0">\${item.name}</h3><div class="desc">\${item.desc || ''}</div></div>\`;
                document.getElementById('list').appendChild(div);
                if(item.lat) L.marker([item.lat, item.lng]).addTo(map).bindPopup(item.name);
            }
        });
    <\/script>
</body>
</html>`;
        const blob = new Blob([html], { type: 'text/html' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'my_trip_v2.1.html'; a.click();
    }
    renderInputs(); updatePreview();
</script>
</body>
</html>
