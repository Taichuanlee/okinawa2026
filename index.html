<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 沖繩連動地圖手冊</title>
    <style>
        body { font-family: "PingFang TC", sans-serif; margin: 0; background-color: #f4f7f9; display: flex; height: 100vh; overflow: hidden; }
        
        /* 左側行程區（可捲動） */
        #content-wrapper { width: 60%; height: 100vh; overflow-y: auto; padding: 20px; box-sizing: border-box; scroll-behavior: smooth; }
        
        /* 右側地圖區（固定） */
        #map-wrapper { width: 40%; height: 100vh; background: #eee; border-left: 2px solid #ddd; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }

        /* 卡片樣式微調 */
        .day-title { background: #2c3e50; color: #fff; padding: 8px 20px; border-radius: 50px; margin: 40px auto 20px; width: fit-content; }
        .timeline { position: relative; padding-left: 20px; border-left: 2px solid #d1d8e0; margin-left: 20px; }
        
        .content-card { 
            background: #fff; padding: 20px; border-radius: 12px; margin-bottom: 20px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: 0.3s; cursor: pointer; border: 2px solid transparent;
        }
        /* 滑鼠經過時卡片變色，提醒連動中 */
        .content-card:hover { border-color: #d9534f; transform: translateX(5px); box-shadow: 0 6px 15px rgba(0,0,0,0.1); }

        .time { font-weight: bold; color: #d9534f; margin-right: 10px; }
        .badge { padding: 2px 8px; border-radius: 4px; font-size: 11px; color: #fff; background: #3498db; }
        
        /* 手機版適應：地圖會消失或移到底部 */
        @media (max-width: 768px) {
            body { flex-direction: column; overflow: auto; }
            #content-wrapper { width: 100%; height: auto; }
            #map-wrapper { width: 100%; height: 300px; position: sticky; top: 0; z-index: 1001; }
        }
    </style>
</head>
<body>

<div id="content-wrapper">
    <h1 style="text-align:center;">🌊 沖繩行程地圖連動版</h1>

    <div class="day-title">📍 Day 1 | 4/24</div>
    <div class="timeline">
        <div class="content-card" onmouseover="updateMap('那霸機場')">
            <span class="time">12:15</span><span class="badge">✈️ 交通</span>
            <h4>那霸機場 (JX870)</h4>
            <p>領取行李、辦理租車</p>
        </div>

        <div class="content-card" onmouseover="updateMap('沖繩美爾度假大酒店')">
            <span class="time">下午</span><span class="badge" style="background:#8e44ad;">🏨 住宿</span>
            <h4>飯店 Check-in</h4>
            <p>沖繩美爾度假大酒店</p>
        </div>

        <div class="content-card" onmouseover="updateMap('美國村海灘')">
            <span class="time">下午</span><span class="badge" style="background:#27ae60;">🌅 景點</span>
            <h4>美國村海灘散步</h4>
            <p>看夕陽、逛逛</p>
        </div>
    </div>

    <div class="day-title">📍 Day 2 | 4/25</div>
    <div class="timeline">
        <div class="content-card" onmouseover="updateMap('美麗海水族館')">
            <span class="time">10:30</span><span class="badge" style="background:#27ae60;">🐬 景點</span>
            <h4>美麗海水族館</h4>
            <p>看海豚秀</p>
        </div>

        <div class="content-card" onmouseover="updateMap('古宇利大橋')">
            <span class="time">下午</span><span class="badge" style="background:#00cec9;">🏝️ 景點</span>
            <h4>古宇利島</h4>
            <p>跨海大橋、蝦蝦飯</p>
        </div>
    </div>
    
    <p style="text-align:center; color:#ccc; margin-top:50px;">(其餘行程以此類推...)</p>
</div>

<div id="map-wrapper">
    <iframe id="google-map" 
        src="https://www.google.com/maps/embed/v1/place?key=YOUR_API_KEY_OPTIONAL&q=Okinawa" 
        allowfullscreen>
    </iframe>
</div>

<script>
    // 這段小程式碼負責切換地圖
    function updateMap(locationName) {
        const baseUrl = "https://www.google.com/maps?q=";
        const finalUrl = baseUrl + encodeElementSibling(locationName) + "&output=embed";
        document.getElementById('google-map').src = finalUrl;
    }

    // 輔助函式：處理中文字轉網址格式
    function encodeElementSibling(name) {
        return encodeURIComponent(name + " Okinawa");
    }
</script>

</body>
</html>
